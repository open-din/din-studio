name: adsr
color: "#dddddd"
icon: 📈
label: null
description: ADSR envelope (envelopes.lib / en.adsr) with UI gate.
type: dsp
tags:
  - adsr
  - envelope
  - gate
  - faust
  - stdfaust
customComponent: null
inputs:
  - type: float
    name: gate
    interface: slider
  - type: float
    name: attack
    interface: slider
  - type: float
    name: decay
    interface: slider
  - type: float
    name: sustain
    interface: slider
  - type: float
    name: release
    interface: slider
outputs:
  - type: audio
    name: envelope
    interface: input
dsp: |
  import("stdfaust.lib");
  process = en.adsr(hslider("attack", 0.01, 0, 4, 0.001), hslider("decay", 0.1, 0, 4, 0.001), hslider("sustain", 0.7, 0, 1, 0.01), hslider("release", 0.2, 0, 4, 0.001), button("gate"));
