name: panner
color: "#44ffff"
icon: ↔️
label: null
description: Mono level trim from pan (-1..1); extend to stereo imaging in
  codegen when outputs split.
type: dsp
tags:
  - pan
  - stereo
  - imaging
  - faust
  - stdfaust
customComponent: null
inputs:
  - type: audio
    name: in
    interface: input
  - type: float
    name: pan
    interface: slider
outputs:
  - type: audio
    name: out
    interface: input
dsp: |
  import("stdfaust.lib");
  p = 0.5 * (hslider("pan", 0, -1, 1, 0.01) + 1);
  process = _ * p;
