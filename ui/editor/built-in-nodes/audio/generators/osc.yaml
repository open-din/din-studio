name: osc
color: "#ff8844"
icon: ◐
label: Oscillator
description: Sine oscillator with frequency and detune (oscillators.lib / os.oscsin).
type: dsp
tags:
  - oscillator
  - sine
  - generator
  - faust
  - stdfaust
customComponent: null
inputs:
  - type: float
    name: frequency
    label: Freq
    interface: slider
  - type: float
    name: detune
    interface: slider
outputs:
  - type: audio
    name: out
    label: Audio Out
    interface: input
dsp: |
  import("stdfaust.lib");
  process = os.oscsin(hslider("frequency", 440, 20, 20000, 0.001) + hslider("detune", 0, -100, 100, 0.01));
